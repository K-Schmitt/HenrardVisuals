<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="/favicon.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Critical CSS - Prevent flash of unstyled content -->
  <style>
    html,
    body,
    #root {
      background-color: #000000 !important;
      margin: 0;
      padding: 0;
    }

    body {
      color: #ffffff;
      min-height: 100vh;
    }

    /* Initial loading state */
    #root:empty::after {
      content: '';
      display: block;
      width: 100vw;
      height: 100vh;
      background-color: #000000;
    }
  </style>

  <!-- SEO Meta Tags -->
  <title>Model Portfolio</title>
  <meta name="description" content="Male model portfolio" />
  <meta name="keywords" content="photography, portfolio, photographer, visual, art, professional" />
  <meta name="author" content="HenrardVisuals" />

  <!-- Open Graph -->
  <meta property="og:title" content="Model Portfolio" />
  <meta property="og:description" content="Male model portfolio" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://henrardvisuals.com" />
  <meta property="og:image" content="https://henrardvisuals.com/favicon.jpg" />
  <meta property="og:image:width" content="200" />
  <meta property="og:image:height" content="200" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Model Portfolio" />
  <meta name="twitter:description" content="Male model portfolio" />
  <meta name="twitter:image" content="https://henrardvisuals.com/favicon.jpg" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap"
    rel="stylesheet" />

  <!-- Theme Color -->
  <meta name="theme-color" content="#171717" />
</head>

<body class="bg-surface-950 text-primary-50 antialiased">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>

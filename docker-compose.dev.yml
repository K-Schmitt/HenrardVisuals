# =========================================
# HenrardVisuals - Développement Local
# Stack complet avec Supabase self-hosted
# =========================================

version: '3.8'

services:
  # ----------------------------------------
  # Frontend (React + Vite Dev Server)
  # ----------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: henrard-app-dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_SUPABASE_URL=http://localhost:8000
      - VITE_SUPABASE_ANON_KEY=${ANON_KEY}
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
    networks:
      - henrard-network
    depends_on:
      kong:
        condition: service_healthy

  # ----------------------------------------
  # Base de données PostgreSQL
  # ----------------------------------------
  db:
    image: postgres:15-alpine
    container_name: henrard-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: henrard_db
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./volumes/db/init:/docker-entrypoint-initdb.d
    networks:
      - henrard-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # Supabase Auth (GoTrue)
  # ----------------------------------------
  auth:
    image: supabase/gotrue:v2.132.3
    container_name: henrard-auth
    restart: unless-stopped
    ports:
      - "9999:9999"
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: http://localhost:8000
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/henrard_db?search_path=auth
      GOTRUE_SITE_URL: http://localhost:5173
      GOTRUE_URI_ALLOW_LIST: ""
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_ADMIN_EMAIL: admin@localhost
      GOTRUE_SMTP_HOST: ""
      GOTRUE_SMTP_PORT: 587
      GOTRUE_SMTP_USER: ""
      GOTRUE_SMTP_PASS: ""
      GOTRUE_SMTP_SENDER_NAME: HenrardVisuals
    networks:
      - henrard-network
    depends_on:
      db:
        condition: service_healthy

  # ----------------------------------------
  # Supabase REST API (PostgREST)
  # ----------------------------------------
  rest:
    image: postgrest/postgrest:v11.2.2
    container_name: henrard-rest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/henrard_db
      PGRST_DB_SCHEMAS: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
    networks:
      - henrard-network
    depends_on:
      db:
        condition: service_healthy

  # ----------------------------------------
  # Supabase Storage (Fichiers & Images)
  # ----------------------------------------
  storage:
    image: supabase/storage-api:v0.43.11
    container_name: henrard-storage
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/henrard_db
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:8080
    volumes:
      - storage_data:/var/lib/storage
    networks:
      - henrard-network
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started

  # ----------------------------------------
  # Image Proxy (Redimensionnement auto)
  # ----------------------------------------
  imgproxy:
    image: darthsim/imgproxy:v3.8.0
    container_name: henrard-imgproxy
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      IMGPROXY_BIND: ":8080"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
    volumes:
      - storage_data:/var/lib/storage:ro
    networks:
      - henrard-network

  # ----------------------------------------
  # Postgres Meta (Admin DB)
  # ----------------------------------------
  meta:
    image: supabase/postgres-meta:v0.68.0
    container_name: henrard-meta
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: henrard_db
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - henrard-network
    depends_on:
      db:
        condition: service_healthy

  # ----------------------------------------
  # Kong Gateway (API unifiée)
  # ----------------------------------------
  kong:
    image: kong:2.8
    container_name: henrard-kong
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
    volumes:
      - ./volumes/kong/kong.yml:/var/lib/kong/kong.yml:ro
    networks:
      - henrard-network
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_started
      rest:
        condition: service_started
      storage:
        condition: service_started

networks:
  henrard-network:
    driver: bridge

volumes:
  db_data:
    driver: local
  storage_data:
    driver: local
